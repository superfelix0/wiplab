name: Update US liquidity data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-us-liquidity.yml"
      - "scripts/update_us_liquidity.py"
  schedule:
    # F4 US liquidity: 08:00 KST every day. GitHub Actions cron uses UTC.
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Collect US liquidity data
        run: python scripts/update_us_liquidity.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/us-liquidity.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update US liquidity data"
            git push
          fi
