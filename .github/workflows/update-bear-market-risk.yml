name: Update bear market risk data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-bear-market-risk.yml"
      - "scripts/update_bear_market_risk.py"
      - "docs/data/bear-market-risk.json"
      - "docs/data/kospi-sentiment.csv"
      - "docs/data/kospi-sentiment-meta.json"
      - "docs/data/us-liquidity.json"
      - "docs/data/ai-earnings.json"
      - "docs/data/market-per.json"
      - "docs/data/global-mega-ipo-events.json"
  schedule:
    # F7 Bear Market Risk: Sunday 09:30 KST. GitHub Actions cron uses UTC.
    - cron: "30 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiplabs-main-data-writers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Calculate bear market risk score
        run: python scripts/update_bear_market_risk.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/bear-market-risk.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update bear market risk data"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push origin HEAD:main; then
                exit 0
              fi
              echo "Push attempt ${attempt}/3 failed. Retrying after remote sync."
              sleep $((attempt * 10))
            done
            exit 1
          fi
