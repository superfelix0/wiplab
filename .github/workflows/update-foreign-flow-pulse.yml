name: Update foreign flow pulse

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-foreign-flow-pulse.yml"
      - "scripts/update_foreign_flow_pulse.py"
  schedule:
    # KRX publishes end-of-day investor data after the market close.
    # 10:15 UTC = 19:15 KST every day; holidays safely deduplicate by trading date.
    - cron: "15 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiplabs-main-data-writers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Collect KRX foreign flow
        run: python scripts/update_foreign_flow_pulse.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/foreign-flow-pulse.json
          if git diff --cached --quiet; then
            echo "No foreign-flow data changes to commit."
          else
            git commit -m "Update foreign flow pulse data"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push origin HEAD:main; then
                exit 0
              fi
              echo "Push attempt ${attempt}/3 failed. Retrying after remote sync."
              sleep $((attempt * 10))
            done
            exit 1
          fi
