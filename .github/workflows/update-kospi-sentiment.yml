name: Update KOSPI sentiment data

on:
  schedule:
    # 00:00 KST every day. GitHub Actions cron uses UTC.
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools pandas pykrx==1.0.51

      - name: Check KRX secret presence
        run: |
          python - <<'PY'
          import os
          print("KRX_ID configured:", bool(os.getenv("KRX_ID")))
          print("KRX_PW configured:", bool(os.getenv("KRX_PW")))
          PY

      - name: Collect KOSPI sentiment data
        run: python scripts/update_kospi_sentiment.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/kospi-sentiment.csv docs/data/kospi-sentiment-meta.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update KOSPI sentiment data"
            git push
          fi
