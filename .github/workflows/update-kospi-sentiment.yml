name: Update KOSPI market data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-kospi-sentiment.yml"
      - "scripts/update_kospi_sentiment.py"
      - "scripts/update_market_per.py"
      - "scripts/update_signal_history.py"
  schedule:
    # F1 KOSPI PER + F2 sentiment: 19:00 KST on Korean trading days.
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiplabs-main-data-writers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # A queued push-triggered run may start after an earlier data writer
          # has advanced main. Always build on the latest accumulated data.
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools pandas pykrx

      - name: Check KRX secret presence
        run: |
          python - <<'PY'
          import os
          print("KRX_ID configured:", bool(os.getenv("KRX_ID")))
          print("KRX_PW configured:", bool(os.getenv("KRX_PW")))
          PY

      - name: Collect KOSPI market data
        run: |
          for attempt in 1 2 3; do
            echo "Collection attempt ${attempt}/3"
            if python scripts/update_kospi_sentiment.py && python scripts/update_market_per.py && python scripts/update_signal_history.py && node scripts/build_daily_state.mjs && node tools/validate.mjs --require-prev; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 30))
          done

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/kospi-sentiment.csv docs/data/kospi-sentiment-meta.json docs/data/kospi-per-history.csv docs/data/market-per.json docs/data/signal-history.json docs/data/daily-state.json docs/data/regime-history.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update KOSPI market data"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push origin HEAD:main; then
                exit 0
              fi
              echo "Push attempt ${attempt}/3 failed. Retrying after remote sync."
              sleep $((attempt * 10))
            done
            exit 1
          fi
