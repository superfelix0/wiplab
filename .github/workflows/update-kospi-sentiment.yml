name: Update KOSPI sentiment data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-kospi-sentiment.yml"
      - "scripts/update_kospi_sentiment.py"
      - "scripts/update_market_per.py"
      - "scripts/update_us_liquidity.py"
  schedule:
    # 19:00 KST every day. GitHub Actions cron uses UTC.
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools pandas pykrx

      - name: Check KRX secret presence
        run: |
          python - <<'PY'
          import os
          print("KRX_ID configured:", bool(os.getenv("KRX_ID")))
          print("KRX_PW configured:", bool(os.getenv("KRX_PW")))
          PY

      - name: Collect KOSPI sentiment data
        run: |
          for attempt in 1 2 3; do
            echo "Collection attempt ${attempt}/3"
            if python scripts/update_kospi_sentiment.py && python scripts/update_market_per.py && python scripts/update_us_liquidity.py; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 30))
          done

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/kospi-sentiment.csv docs/data/kospi-sentiment-meta.json docs/data/market-per.json docs/data/us-liquidity.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update KOSPI sentiment data"
            git push
          fi
