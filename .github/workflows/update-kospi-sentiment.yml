name: Update KOSPI sentiment data

on:
  schedule:
    # 18:10 KST. KRX daily data can lag, so run after the Korean cash session.
    - cron: "10 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pykrx pandas

      - name: Collect KOSPI sentiment data
        run: python scripts/update_kospi_sentiment.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/kospi-sentiment.csv docs/data/kospi-sentiment-meta.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update KOSPI sentiment data"
            git push
          fi
