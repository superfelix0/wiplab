name: Update KOSPI forward PER reference

on:
  schedule:
    - cron: "0 0 * * 1" # Monday 09:00 KST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiplabs-main-data-writers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python scripts/update_kospi_forward_per.py
      - name: Commit reference history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/kospi-forward-per-history.csv
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Update KOSPI forward PER reference"
          git pull --rebase origin main
          git push origin HEAD:main
