name: Update AI earnings data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-ai-earnings.yml"
      - "scripts/update_ai_earnings.py"
  schedule:
    # F3/F4/F6 U.S. share-price data: 06:00 KST every day. GitHub Actions cron uses UTC.
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiplabs-main-data-writers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Collect AI earnings data
        run: python scripts/update_ai_earnings.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/ai-earnings.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update AI earnings data"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push origin HEAD:main; then
                exit 0
              fi
              echo "Push attempt ${attempt}/3 failed. Retrying after remote sync."
              sleep $((attempt * 10))
            done
            exit 1
          fi
