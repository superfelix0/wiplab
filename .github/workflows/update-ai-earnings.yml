name: Update AI earnings data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-ai-earnings.yml"
      - "scripts/update_ai_earnings.py"
  schedule:
    # F3 hyperscaler CAPEX and F4 memory earnings: Monday 08:00 KST. GitHub Actions cron uses UTC.
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Collect AI earnings data
        run: python scripts/update_ai_earnings.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/ai-earnings.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update AI earnings data"
            git push
          fi
