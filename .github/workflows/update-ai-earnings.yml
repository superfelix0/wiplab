name: Update AI earnings data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-ai-earnings.yml"
      - "scripts/update_ai_earnings.py"
  schedule:
    # F3/F4/F6 share-price data: U.S. close at 06:00 KST and Korean close at
    # 19:00 KST. The later run refreshes Korean listings; U.S. closes remain
    # the most recently available U.S. regular-session values.
    - cron: "0 10,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiplabs-main-data-writers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      - name: Collect AI earnings data and rebuild regimes
        run: |
          python scripts/update_ai_earnings.py
          node scripts/build_daily_state.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/ai-earnings.json docs/data/daily-state.json docs/data/regime-history.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update AI earnings data"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push origin HEAD:main; then
                exit 0
              fi
              echo "Push attempt ${attempt}/3 failed. Retrying after remote sync."
              sleep $((attempt * 10))
            done
            exit 1
          fi
