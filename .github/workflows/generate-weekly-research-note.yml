name: Generate weekly research note

on:
  schedule:
    # Weekly notes: Sunday 09:00 KST, after the U.S. Friday regular session has ended.
    # GitHub Actions cron uses UTC.
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate weekly research note
        run: python scripts/generate_weekly_research_note.py

      - name: Commit weekly note
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/notes/weekly docs/en/notes/weekly docs/sitemap.xml
          if git diff --cached --quiet; then
            echo "No weekly note changes to commit."
          else
            git commit -m "Generate weekly research note"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push; then
                exit 0
              fi
              echo "Push attempt ${attempt}/3 failed. Retrying after remote sync."
              sleep $((attempt * 10))
            done
            exit 1
          fi
