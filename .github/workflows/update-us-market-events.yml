name: Update U.S. market events

on:
  schedule:
    - cron: "30 21 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiplabs-main-data-writers
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Collect upcoming U.S. earnings events
        run: python scripts/update_us_market_events.py
      - name: Commit calendar data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/us-market-events.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Update U.S. market events"
          for attempt in 1 2 3; do
            git pull --rebase origin main
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 10))
          done
          exit 1
